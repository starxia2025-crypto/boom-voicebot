version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: boom_asistente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/boom_asistente?schema=public
      APP_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:4000
      DEFAULT_BRANCH: Sucursal Centro
      VOICE_STT_PROVIDER: browser
      VOICE_TTS_PROVIDER: browser
    ports:
      - "4000:4000"

volumes:
  postgres_data:

